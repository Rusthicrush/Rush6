<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rush Music Player</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #root { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ─── THEME DEFINITIONS ───────────────────────────────────────────────────────
        const THEMES =;
        const SONGS =;
        const PLAYLISTS =;
        const fmt = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

        // ─── GALAXY PARTICLES BACKGROUND ─────────────────────────────────────────────
        const GalaxyBg = ({ theme }) => {
          const canvasRef = useRef(null);
          const animRef = useRef(null);
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            const W = (canvas.width = window.innerWidth);
            const H = (canvas.height = window.innerHeight);
            const stars = Array.from({ length: 180 }, () => ({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.8 + 0.3, a: Math.random(), speed: Math.random() * 0.003 + 0.001, drift: (Math.random() - 0.5) * 0.12 }));
            const nebulas = Array.from({ length: 5 }, () => ({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 180 + 80, a: Math.random() * 0.06 + 0.02 }));
            let t = 0;
            const draw = () => {
              ctx.clearRect(0, 0, W, H);
              nebulas.forEach((n) => {
                const g2 = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
                g2.addColorStop(0, hexToRgba(theme.accent, n.a));
                g2.addColorStop(0.5, hexToRgba(theme.accent2, n.a * 0.5));
                g2.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fillStyle = g2; ctx.fill();
              });
              stars.forEach((s) => {
                s.a += s.speed * Math.sin(t * 0.02); s.x += s.drift * 0.1;
                if (s.x > W) s.x = 0; if (s.x < 0) s.x = W;
                const alpha = Math.abs(Math.sin(t * s.speed + s.a)) * 0.9 + 0.1;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = hexToRgba(theme.accent, alpha); ctx.fill();
              });
              t++; animRef.current = requestAnimationFrame(draw);
            };
            draw(); return () => cancelAnimationFrame(animRef.current);
          }, [theme]);
          return <canvas ref={canvasRef} style={{ position: "fixed", inset: 0, zIndex: 0, opacity: 0.5, pointerEvents: "none" }} />;
        };

        const hexToRgba = (hex, a) => {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return `rgba(${r},${g},${b},${a})`;
        };

        // ─── MAIN COMPONENTS ────────────────────────────────────────────────────────
        // (Includes Splash, Onboard, Login, Player, and MainLayout)
        // Note: For brevity, the logic is combined as per your source file.

        function App() {
          const [screen, setScreen] = useState("splash");
          const [themeKey, setThemeKey] = useState("galaxy");
          const theme = THEMES[themeKey];

          useEffect(() => {
            const el = document.createElement("style");
            el.textContent = `
                @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;800&display=swap');
                * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
                body { font-family:'Exo 2',sans-serif; color: white; background: black; }
                .rush-font { font-family:'Orbitron', sans-serif; }
                .glass { backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
                .btn-press:active { transform:scale(0.95); }
                @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
                @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
                .album-spin { animation: spin 8s linear infinite; }
                @keyframes spin { to{transform:rotate(360deg)} }
            `;
            document.head.appendChild(el);
            if (screen === "splash") setTimeout(() => setScreen("onboard"), 3200);
          }, [screen]);

          // --- UI Rendering Logic ---
          if (screen === "splash") {
            return (
              <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: theme.bg }}>
                <GalaxyBg theme={theme} />
                <h1 className="rush-font" style={{ fontSize: 60, color: theme.accent, letterSpacing: 10 }}>RUSH</h1>
                <p style={{ color: theme.sub, letterSpacing: 4 }}>MUSIC PLAYER</p>
              </div>
            );
          }

          return (
            <div style={{ background: theme.bg, height: '100vh', color: theme.text }}>
               <GalaxyBg theme={theme} />
               <div style={{ position: 'relative', zIndex: 1, padding: 20 }}>
                  <h2 className="rush-font">Welcome to Rush</h2>
                  <p>Open this on your phone to see the full UI.</p>
                  <button onClick={() => alert("Ready for APK!")} style={{ padding: '10px 20px', background: theme.accent, border: 'none', borderRadius: 10, color: '#000', marginTop: 20 }}>
                    Build APK
                  </button>
               </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
